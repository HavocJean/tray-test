services:
  app:
    build:
      context: ./docker/php
    container_name: tray_app
    volumes:
      - ./backend:/var/www/backend
    working_dir: /var/www/backend
    depends_on:
      - mysql
      - redis
    networks:
      - tray-network

  nginx:
    image: nginx:stable-alpine
    container_name: tray_nginx
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/backend
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - tray-network

  mysql:
    image: mysql:8.0
    container_name: tray_mysql
    restart: always
    environment:
      MYSQL_DATABASE: tray_test
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3306:3306"
    volumes:
      - tray_mysql_data:/var/lib/mysql
    networks:
      - tray-network

  redis:
    image: redis:alpine
    container_name: tray_redis
    networks:
      - tray-network

  queue:
    build:
      context: ./docker/php
    container_name: tray_queue
    command: php artisan queue:work redis --sleep=1 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/backend
    working_dir: /var/www/backend
    depends_on:
      - mysql
      - redis
    networks:
      - tray-network

  frontend:
    image: node:22-bookworm-slim
    container_name: tray_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY: http://nginx:80
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - nginx
    networks:
      - tray-network

volumes:
  tray_mysql_data:
  frontend_node_modules:

networks:
  tray-network: